apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: grupo-8

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth
          image: pedrofcruz/projeto-final-auth:latest

          workingDir: /app

          command:
            - python
            - -m
            - app

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          envFrom:
            - secretRef:
                name: auth-env-docker

          env:
            - name: DB_HOST
              value: "137.131.132.161" # IP ou domínio do banco

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "auth_hospital"

            - name: DB_USER
              value: postgres

            - name: DB_PASSWORD
              value: postgres

            - name: dbHost
              value: "137.131.132.161" # IP ou domínio do banco

            - name: dbPort
              value: "5432"

            - name: dbname
              value: "auth_hospital"

            - name: dbUser
              value: postgres

            - name: dbPassword
              value: postgres
            - name: SECRET
              value: DT4xMpG3kn44CsQ1ijgTjrWftPTU3AQ9+jmSNT/4vUs=
          ports:
            - containerPort: 50051

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: grupo-8

spec:
  type: NodePort
  selector:
    app: auth-service

  ports:
    - port: 50054
      targetPort: 50051
      nodePort: 30054