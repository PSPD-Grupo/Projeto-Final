apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: grupo-8

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth
          image: auth-auth:latest
          imagePullPolicy: IfNotPresent

          workingDir: /app

          command:
            - python
            - -m
            - app

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          envFrom:
            - secretRef:
                name: auth-env-docker

          env:
            - name: DB_HOST
              value: "137.131.132.161" # IP ou domínio do banco

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "auth"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db-credentials
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-credentials
                  key: POSTGRES_PASSWORD

          ports:
            - containerPort: 50051

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: grupo-8

spec:
  selector:
    app: auth-service

  ports:
    - port: 50054
      targetPort: 50051