apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-transform
  namespace: grupo-8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-transform
  template:
    metadata:
      labels:
        app: data-transform
    spec:
      containers:
        - name: data-transform
          # Build a partir de ./datatransform/Dockerfile e envie para seu registry
          image: your-registry/data-transform:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: GRPC_PORT
              value: "50053"
            - name: METRICS_PORT
              value: "9103"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: data-transform-secrets
                  key: JWT_SECRET
            - name: PSEUDONYMIZE_SALT
              valueFrom:
                secretKeyRef:
                  name: data-transform-secrets
                  key: PSEUDONYMIZE_SALT
          ports:
            - containerPort: 50053
            - containerPort: 9103
---
apiVersion: v1
kind: Service
metadata:
  name: data-transform
  namespace: grupo-8
spec:
  selector:
    app: data-transform
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: metrics
      port: 9103
      targetPort: 9103