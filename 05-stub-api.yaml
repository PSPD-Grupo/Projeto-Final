apiVersion: apps/v1
kind: Deployment
metadata:
  name: stub-api
  namespace: grupo-8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stub-api
  template:
    metadata:
      labels:
        app: stub-api
    spec:
      containers:
        - name: stub-api
          # Build a partir de ./stub/dockerfile e envie para seu registry
          image: pedrofcruz/projeto-final-stub-service:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - secretRef:
                name: stub-api-env
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: stub-api
  namespace: grupo-8
spec:
  type: NodePort
  selector:
    app: stub-api
  ports:
    - port: 8000
      targetPort: 8000
      
  # Se precisar acesso externo (equivalente ao "8000:8000" do host), troque para:
  # type: NodePort