apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: grupo-8

spec:
  replicas: 1

  selector:
    matchLabels:
      app: data-service

  template:
    metadata:
      labels:
        app: data-service

    spec:
      containers:
        - name: data-service
          image: pedrofcruz/projeto-final-data-service:latest

          env:
            - name: DB_HOST
              value: "192.168.122.1"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "pseudopep_g08"

            - name: DB_USER
              value: "grupo08_user"

            - name: DB_PASSWORD
              value: "123@g08"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          ports:
            - containerPort: 50051

---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: grupo-8

spec:
  selector:
    app: data-service

  ports:
    - port: 50052
      targetPort: 50051