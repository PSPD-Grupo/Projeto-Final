syntax = "proto3";
package datatransform;

service DataTransform {
    rpc Transform (TransformRequest) returns (TransformResponse);
    rpc TransformAggregate (AggregateRequest) returns (AggregateResponse);
}

message Patient {
    string patient_id = 1;
    string name = 2;
    string birth_date = 3; // ISO 8601 (YYYY-MM-DD)
    string gender = 4;
    string city = 5;
    string state = 6;
    string cpf = 7;
    string cns = 8;
}

message Encounter {
    string encounter_id = 1;
    string patient_id = 2;
    string start_date = 3;
    string end_date = 4;
    string encounter_type = 5;  // Ambulatorial, Emergência, Internação, Retorno
    string department = 6;      // Cardiologia, Endocrinologia, ...
}

message ClinicalEvent {
    string event_id = 1;
    string patient_id = 2;
    string encounter_id = 3;
    string event_type = 4;   // CONDITION | OBSERVATION | MEDICATION
    string event_code = 5;   // Diabetes, Hipertensão, Creatinina, Insulina...
    string description = 6;
    string event_date = 7;
    string value = 8;        // preenchido se OBSERVATION ou MEDICATION
    string unit = 9;
}

message TransformRequest {
    Patient patient = 1;
    repeated Encounter encounters = 2;
    repeated ClinicalEvent clinical_events = 3;
}

message TransformResponse {
    string fhir_bundle_json = 1;
}

message AggregateRequest {
  string cohort_code = 1;
  repeated Patient patients = 2;
  repeated ClinicalEvent clinical_events = 3;
}

message AggregateResponse {
  string fhir_bundle_json = 1;
}

