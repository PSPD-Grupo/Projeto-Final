services:

  service:
    build: 
      context: ./stub
      dockerfile: dockerfile
    container_name: stub-api-final
    env_file:
      - .env
    ports:
      - "8000:8000"

  data-service:
    build:
      context: ./dataService
      dockerfile: Dockerfile
    container_name: data-service
    ports:
      - "50052:50051"
    environment:
      DB_HOST: 192.168.122.1
      DB_PORT: 5432
      DB_NAME: pseudopep_g08
      DB_USER: grupo08_user
      DB_PASSWORD: 123@g08

  db:
    image: postgres:16-alpine
    container_name: data-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "50054:50051"
    working_dir: /app
    command: python -m app
    env_file:
      - .env_docker
    environment:
      DB_HOST: db_auth
      DB_PORT: 5432
      DB_NAME: ${dbname}
      DB_USER: ${dbUser}
      DB_PASSWORD: ${dbPassword}
    depends_on:
      db_auth:
        condition: service_healthy

  db_auth:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    env_file:
      - ./auth/.env_docker
    environment:
      POSTGRES_DB: ${dbname}
      POSTGRES_USER: ${dbUser}
      POSTGRES_PASSWORD: ${dbPassword}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./auth/db/createdb.sql:/docker-entrypoint-initdb.d/01_createdb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-transform:
    build: 
      context: ./datatransform
    ports:
      - "50053:50053"
      - "9103:9103"
    environment:
      GRPC_PORT: "50053"
      METRICS_PORT: "9103"
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      PSEUDONYMIZE_SALT: ${PSEUDONYMIZE_SALT:-dev-salt}

volumes:
  pgdata: