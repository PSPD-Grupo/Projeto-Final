syntax = "proto3";

package patientdata;

service PatientDataService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetPatient(GetPatientRequest) returns (GetPatientResponse);
  rpc SearchPatients(SearchPatientsRequest) returns (SearchPatientsResponse);
  rpc ListEncounters(ListEncountersRequest) returns (ListEncountersResponse);
  rpc ListClinicalEvents(ListClinicalEventsRequest) returns (ListClinicalEventsResponse);
  rpc ListResearchProjects(ListResearchProjectsRequest) returns (ListResearchProjectsResponse);
  rpc GetCohortStats(GetCohortStatsRequest) returns (GetCohortStatsResponse);
  rpc ListAnonymizedLabResults(ListAnonymizedLabResultsRequest) returns (ListAnonymizedLabResultsResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  FULL = 1;
  PARTIAL = 2;
  ANONYMIZED = 3;
  AGGREGATED = 4;
}

message PatientRecord {
  AccessLevel access_level = 1;
  string patient_ref = 2;
  string full_name = 3;
  string initials = 4;
  string birth_date = 5;
  string birth_year = 6;
  string age_range = 7;
  string gender = 8;
  string city = 9;
  string state = 10;
  string cpf = 11;
  string cns = 12;
}

message Patient {
  string patient_id = 1;
  string full_name = 2;
  string birth_date = 3;
  string gender = 4;
  string city = 5;
  string state = 6;
  string cpf = 7;
  string cns = 8;
}

message Encounter {
  string encounter_id = 1;
  string patient_ref = 2;
  string start_date = 3;
  string end_date = 4;
  string encounter_type = 5;
  string department = 6;
}

message ClinicalEvent {
  string event_id = 1;
  string patient_ref = 2;
  string encounter_id = 3;
  string event_type = 4;
  string code = 5;
  string description = 6;
  string value = 7;
  string unit = 8;
  string event_date = 9;
}

message GetPatientRequest {
  string patient_id = 1;
}

message GetPatientResponse {
  PatientRecord patient = 1;
}

message SearchPatientsRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SearchPatientsResponse {
  repeated PatientRecord patients = 1;
}

message ListEncountersRequest {
  string patient_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListEncountersResponse {
  repeated Encounter encounters = 1;
}

message ListClinicalEventsRequest {
  string patient_id = 1;
  string encounter_id = 2;
  string event_type = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListClinicalEventsResponse {
  repeated ClinicalEvent events = 1;
}

message ResearchProject {
  string project_id = 1;
  string title = 2;
  string researcher_username = 3;
  string target_condition_code = 4;
  string status = 5;
  string valid_until = 6;
}

message ListResearchProjectsRequest {
  string status = 1;
}

message ListResearchProjectsResponse {
  repeated ResearchProject projects = 1;
}

message GetCohortStatsRequest {
  string project_id = 1;
}

message Bucket {
  string label = 1;
  int32 count = 2;
  double percentage = 3;
}

message GetCohortStatsResponse {
  AccessLevel access_level = 1;
  string project_id = 2;
  string target_condition_code = 3;
  int32 total_patients = 4;
  repeated Bucket gender_distribution = 5;
  repeated Bucket age_distribution = 6;
  repeated Bucket department_distribution = 7;
  double hba1c_average = 8;
  repeated Bucket medication_frequency = 9;
}

message LabExam {
  string code = 1;
  string description = 2;
  string value = 3;
  string unit = 4;
  string event_date = 5;
}

message AnonymizedLabResult {
  string patient_hash = 1;
  string gender = 2;
  string age_range = 3;
  string state = 4;
  repeated LabExam exams = 5;
}

message ListAnonymizedLabResultsRequest {
  string project_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListAnonymizedLabResultsResponse {
  AccessLevel access_level = 1;
  repeated AnonymizedLabResult results = 2;
}
